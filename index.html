<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none';"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DiffDock</title>
    <link rel="stylesheet" href="styles.css">
    <script src="diff-engine.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="app-title">
          <div class="window-controls" aria-hidden="true">
            <span class="control control-close"></span>
            <span class="control control-minimize"></span>
            <span class="control control-zoom"></span>
          </div>
          <div>
            <h1>DiffDock</h1>
            <p>行単位テキスト比較</p>
          </div>
        </div>

        <div class="toolbar" aria-label="比較操作">
          <label class="toggle">
            <input id="ignoreWhitespace" type="checkbox">
            <span class="switch" aria-hidden="true"></span>
            <span>空白を無視</span>
          </label>
          <button id="swapButton" type="button" class="button">
            <span aria-hidden="true">⇄</span>
            <span>左右を入れ替え</span>
          </button>
          <button id="clearButton" type="button" class="button button-danger">
            <span aria-hidden="true">⌫</span>
            <span>クリア</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="editor-panes" aria-label="比較するテキスト">
          <article class="editor-pane">
            <div class="pane-header">
              <label for="leftInput">左ペイン</label>
              <span id="leftLineCount">0 行</span>
            </div>
            <textarea
              id="leftInput"
              spellcheck="false"
              placeholder="左側のテキストを入力"
              aria-label="左側の比較テキスト"
            ></textarea>
          </article>

          <article class="editor-pane">
            <div class="pane-header">
              <label for="rightInput">右ペイン</label>
              <span id="rightLineCount">0 行</span>
            </div>
            <textarea
              id="rightInput"
              spellcheck="false"
              placeholder="右側のテキストを入力"
              aria-label="右側の比較テキスト"
            ></textarea>
          </article>
        </section>

        <section class="summary-bar" aria-label="比較結果の概要">
          <div id="statusBanner" class="status-banner" role="status" aria-live="polite">
            一致しています
          </div>
          <div class="stats" aria-label="差分件数">
            <span class="stat stat-total">差分 <strong id="countTotal">0</strong></span>
            <span class="stat stat-changed">変更 <strong id="countChanged">0</strong></span>
            <span class="stat stat-added">追加 <strong id="countAdded">0</strong></span>
            <span class="stat stat-removed">削除 <strong id="countRemoved">0</strong></span>
            <span class="stat stat-equal">同一 <strong id="countEqual">0</strong></span>
          </div>
        </section>

        <section class="diff-panel" aria-label="行単位の差分">
          <div class="diff-header" aria-hidden="true">
            <span class="line-heading">行</span>
            <span>左</span>
            <span class="line-heading">行</span>
            <span>右</span>
          </div>
          <div id="diffGrid" class="diff-grid" role="table" aria-label="差分一覧"></div>
        </section>
      </main>
    </div>
  </body>
</html>
